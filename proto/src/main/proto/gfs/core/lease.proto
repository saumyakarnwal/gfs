syntax = "proto3";

package gfs;

import "gfs/core/chunk.proto";

option java_package = "gfs.proto";
option java_multiple_files = true;

message LeaseGrant {
  ChunkReference chunk = 1;
  int64 expiration_timestamp = 2;
  ChunkServerAddress primary = 3;
  repeated ChunkServerAddress secondaries = 4;
}
