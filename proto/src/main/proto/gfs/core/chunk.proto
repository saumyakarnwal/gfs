syntax = "proto3";

package gfs;

option java_package = "gfs.proto";
option java_multiple_files = true;

message ChunkReference {
  int64 handle = 1;
  int64 version = 2;
}

message ChunkServerAddress {
  string server_id = 1;
  string endpoint = 2;  // host:port
}

message ChunkInfo {
  ChunkReference chunk = 1;
  repeated ChunkServerAddress locations = 2;
}
