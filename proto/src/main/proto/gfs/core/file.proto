syntax = "proto3";

package gfs;

import "gfs/core/chunk.proto";

option java_package = "gfs.proto";
option java_multiple_files = true;

message FileInfo {
  string path = 1;
  int64 file_size = 2;
  repeated ChunkInfo chunks = 3;
  bool is_directory = 4;  // Directories have no chunks or file_size; only exist in the namespace tree
  int64 created_at = 5;
  int64 modified_at = 6;
  int32 replication_factor = 7;
}
